<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      color: gold;
    }

    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>🎮 Live Admin Dashboard</h1>

<div id="events"></div>

<script>
  const socket = io();
  const eventsDiv = document.getElementById("events");

  function addEvent(text) {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = text;
    eventsDiv.prepend(div);
  }

  socket.on("connect", () => {
    addEvent("🟢 Admin Connected to Server");
  });

  socket.on("adminUpdate", (data) => {
    if (data.action === "join") {
      addEvent(`👤 Player Joined: ${data.player}`);
    }

    if (data.action === "spin") {
      addEvent(`🎰 ${data.player} spun and got: ${data.result}`);
    }

    if (data.action === "leave") {
      addEvent(`❌ Player Left`);
    }
  });
</script>

</body>
</html>
