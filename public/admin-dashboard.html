<!DOCTYPE html>
<html>
<head>
  <title>Game Admin Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .card h2 {
      margin: 0;
      font-size: 28px;
      color: gold;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #0f172a;
    }

    canvas {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  🎮 Professional Admin Dashboard
</header>

<div class="container">

  <div class="stats">
    <div class="card">
      <p>Online Players</p>
      <h2 id="onlineCount">0</h2>
    </div>

    <div class="card">
      <p>Total Players</p>
      <h2 id="totalPlayers">0</h2>
    </div>

    <div class="card">
      <p>Total Spins</p>
      <h2 id="totalSpins">0</h2>
    </div>

    <div class="card">
      <p>Total Coins Won</p>
      <h2 id="totalCoins">0</h2>
    </div>
  </div>

  <canvas id="spinChart"></canvas>

  <h2>Players</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Spins</th>
        <th>Coins</th>
      </tr>
    </thead>
    <tbody id="playersTable"></tbody>
  </table>

  <h2>Spin History</h2>
  <table>
    <thead>
      <tr>
        <th>Player</th>
        <th>Result</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>

</div>

<script>

  app.use(express.static("public"));

app.get("/admin", (req, res) => {
  res.sendFile(__dirname + "/public/admin-login.html");
});
  const socket = io();

  let players = {};
  let spinHistory = [];
  let totalSpins = 0;
  let totalCoins = 0;
  let onlineCount = 0;

  const ctx = document.getElementById('spinChart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Total Spins',
        data: [],
        borderColor: 'gold',
        borderWidth: 2
      }]
    }
  });

  function updateDashboard() {

    document.getElementById("onlineCount").innerText = onlineCount;
    document.getElementById("totalPlayers").innerText = Object.keys(players).length;
    document.getElementById("totalSpins").innerText = totalSpins;
    document.getElementById("totalCoins").innerText = totalCoins;

    const playersTable = document.getElementById("playersTable");
    playersTable.innerHTML = "";

    for (let name in players) {
      playersTable.innerHTML += `
        <tr>
          <td>${name}</td>
          <td>${players[name].online ? "🟢 Online" : "🔴 Offline"}</td>
          <td>${players[name].spins}</td>
          <td>${players[name].coins}</td>
        </tr>
      `;
    }

    const historyTable = document.getElementById("historyTable");
    historyTable.innerHTML = "";

    spinHistory.slice().reverse().forEach(entry => {
      historyTable.innerHTML += `
        <tr>
          <td>${entry.player}</td>
          <td>${entry.result}</td>
          <td>${entry.time}</td>
        </tr>
      `;
    });
  }

  socket.on("adminUpdate", (data) => {

    if (data.action === "join") {
      if (!players[data.player]) {
        players[data.player] = { spins: 0, coins: 0, online: true };
      }
      players[data.player].online = true;
      onlineCount++;
    }

    if (data.action === "leave") {
      if (players[data.player]) {
        players[data.player].online = false;
        onlineCount--;
      }
    }

    if (data.action === "spin") {
      if (!players[data.player]) {
        players[data.player] = { spins: 0, coins: 0, online: true };
      }

      players[data.player].spins++;
      players[data.player].coins += data.result;

      totalSpins++;
      totalCoins += data.result;

      spinHistory.push({
        player: data.player,
        result: data.result,
        time: new Date().toLocaleTimeString()
      });

      chart.data.labels.push("");
      chart.data.datasets[0].data.push(totalSpins);
      chart.update();
    }

    updateDashboard();
  });

</script>

</body>
</html>
